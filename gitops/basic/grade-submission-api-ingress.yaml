apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grade-submission-api-ingress
  namespace: grade-demo
spec:
  ingressClassName: nginx
  rules:
     - http:
        paths:
          - path: /grades-api
            pathType: Prefix
            backend:
              service:
                name: grade-submission-api
                port:
                  number: 3000