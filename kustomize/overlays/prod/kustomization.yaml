apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-
nameSuffix: ""

patches:
  - path: replicas-patch.yaml
    target:
      kind: Deployment
      name: grade-submission-api
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: grade-submission-api-ingress

  - path: deployment-label-patch.yaml
    target:
      kind: Deployment
      name: grade-submission-api

  - path: service-selector-patch.yaml
    target:
      kind: Service
      name: grade-submission-api